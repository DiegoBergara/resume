<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CV | Diego Bergara</title>
    <style>
      :root {
        color-scheme: dark;
        --bg-1: #05070f;
        --bg-2: #0d1428;
        --panel: rgba(12, 18, 36, 0.72);
        --panel-border: rgba(102, 179, 255, 0.24);
        --text-main: #e8f1ff;
        --text-soft: #9cb4d8;
        --accent: #6df3ff;
        --accent-2: #8b9bff;
        --shadow: 0 30px 70px rgba(0, 0, 0, 0.45);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", "Segoe UI", Roboto, Arial, sans-serif;
        color: var(--text-main);
        background:
          radial-gradient(circle at 15% -10%, rgba(141, 97, 255, 0.22), transparent 40%),
          radial-gradient(circle at 85% 15%, rgba(64, 212, 255, 0.22), transparent 35%),
          linear-gradient(145deg, var(--bg-1), var(--bg-2));
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(760px, 100%);
      }

      .panel {
        border: 1px solid var(--panel-border);
        background: var(--panel);
        backdrop-filter: blur(14px);
        border-radius: 24px;
        padding: clamp(24px, 4vw, 40px);
        box-shadow: var(--shadow);
        position: relative;
        overflow: hidden;
      }

      .panel::before {
        content: "";
        position: absolute;
        inset: -1px;
        pointer-events: none;
        border-radius: inherit;
        background: linear-gradient(130deg, rgba(109, 243, 255, 0.35), transparent 40%, rgba(139, 155, 255, 0.35));
        mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
        mask-composite: exclude;
        padding: 1px;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--text-soft);
        border: 1px solid rgba(156, 180, 216, 0.3);
        padding: 6px 12px;
        border-radius: 999px;
      }

      h1 {
        margin: 16px 0 10px;
        font-size: clamp(2rem, 6vw, 3rem);
        line-height: 1.05;
      }

      p {
        margin: 0;
        color: var(--text-soft);
        max-width: 60ch;
      }

      .grid {
        margin-top: 30px;
        display: grid;
        gap: 14px;
      }

      .cv-link {
        display: flex;
        align-items: center;
        justify-content: space-between;
        text-decoration: none;
        color: var(--text-main);
        border: 1px solid rgba(156, 180, 216, 0.25);
        background: linear-gradient(135deg, rgba(20, 30, 56, 0.85), rgba(12, 20, 40, 0.95));
        border-radius: 16px;
        padding: 16px 18px;
        transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
      }

      .cv-link:hover,
      .cv-link:focus-visible {
        transform: translateY(-2px);
        border-color: rgba(109, 243, 255, 0.6);
        box-shadow: 0 12px 25px rgba(67, 187, 255, 0.2);
      }

      .cv-link strong {
        display: block;
        margin-bottom: 2px;
      }

      .cv-link span {
        font-size: 0.95rem;
        color: var(--text-soft);
      }

      .arrow {
        color: var(--accent);
        font-size: 1.2rem;
        padding-left: 16px;
      }

      footer {
        margin-top: 18px;
        font-size: 0.85rem;
        color: rgba(156, 180, 216, 0.75);
      }

      @media (max-width: 540px) {
        .cv-link {
          flex-direction: column;
          align-items: flex-start;
          gap: 8px;
        }

        .arrow {
          padding-left: 0;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel" aria-label="Descarga de currículums">
        <span class="badge">Diego Bergara · CV Hub</span>
        <h1>Currículums</h1>
        <p>
          Elegí la versión que prefieras y abrila en una nueva pestaña para descargarla o compartirla.
        </p>

        <div class="grid">
          <a class="cv-link" href="./resumes/CV-Diego_Bergara-EN.pdf" target="_blank" rel="noopener">
            <div>
              <strong>Resume in English</strong>
              <span>Professional profile and experience</span>
            </div>
            <span class="arrow" aria-hidden="true">→</span>
          </a>

          <a class="cv-link" href="./resumes/CV-Diego_Bergara-ES.pdf" target="_blank" rel="noopener">
            <div>
              <strong>CV en Español</strong>
              <span>Perfil profesional y experiencia</span>
            </div>
            <span class="arrow" aria-hidden="true">→</span>
          </a>
        </div>

        <footer>Diseño minimalista · estilo futurista · listo para mobile</footer>
      </section>
    </main>
  </body>
</html>
